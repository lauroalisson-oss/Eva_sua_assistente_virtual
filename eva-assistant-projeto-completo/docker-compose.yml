version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eva-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eva
      POSTGRES_PASSWORD: eva_secret
      POSTGRES_DB: eva_db
    volumes:
      - eva_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eva -d eva_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - eva_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  eva_postgres_data:
  eva_redis_data:
