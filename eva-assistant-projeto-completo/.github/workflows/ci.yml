name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: eva-assistant-projeto-completo/package-lock.json

      - name: Install dependencies
        working-directory: eva-assistant-projeto-completo
        run: npm ci

      - name: Generate Prisma client
        working-directory: eva-assistant-projeto-completo
        run: npx prisma generate

      - name: Lint
        working-directory: eva-assistant-projeto-completo
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        working-directory: eva-assistant-projeto-completo
        run: npm test

      - name: Build
        working-directory: eva-assistant-projeto-completo
        run: npm run build

  prisma-validate:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: eva-assistant-projeto-completo/package-lock.json

      - name: Install dependencies
        working-directory: eva-assistant-projeto-completo
        run: npm ci

      - name: Validate Prisma schema
        working-directory: eva-assistant-projeto-completo
        run: npx prisma validate
